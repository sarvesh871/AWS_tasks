<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Spark</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#3b82f6);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-150px;
    right:-120px;
    filter:blur(20px);
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    bottom:-130px;
    left:-120px;
}

.card{
    position:relative;
    width:min(90%,700px);
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:45px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    animation:fadeIn .8s ease;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

.subtitle{
    color:#dbeafe;
    margin-bottom:35px;
    line-height:1.7;
    font-size:1.1rem;
}

.quote{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    min-height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.2rem;
    transition:.3s;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    color:#1e3a8a;
    background:white;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

button:hover{
    transform:translateY(-4px) scale(1.04);
    background:#dbeafe;
}

.footer{
    margin-top:25px;
    font-size:.9rem;
    color:#dbeafe;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <h1>✨ Daily Spark</h1>

    <p class="subtitle">
        Tiny moments of inspiration for days that feel ordinary.
        Press the button whenever your brain starts acting like it has
        only 2% battery.
    </p>

    <div class="quote" id="quote">
        Click the button to receive a fresh thought.
    </div>

    <button onclick="newQuote()">New Inspiration</button>

    <div class="footer">
        Built with just one HTML file.
    </div>

</div>

<script>
const quotes = [
    "Small progress every day eventually becomes massive success.",
    "Discipline quietly defeats motivation over long periods.",
    "Great ideas begin as unfinished thoughts.",
    "Learn something today that your future self will thank you for.",
    "Curiosity opens more doors than confidence.",
    "You don't have to be extraordinary to begin.",
    "Consistency is a superpower disguised as repetition.",
    "Every expert once searched the internet for the basics too.",
    "The hardest step is usually the first click.",
    "Build. Improve. Repeat."
];

function newQuote(){
    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    const box = document.getElementById("quote");

    box.style.opacity = 0;

    setTimeout(()=>{
        box.textContent = quote;
        box.style.opacity = 1;
    },200);
}

newQuote();
</script>

</body>
</html>
