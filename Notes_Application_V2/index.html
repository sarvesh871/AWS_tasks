<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — AWS</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- App Shell -->
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="brand-name">Notes</span>
      </div>

      <div class="sidebar-section-label">Workspace</div>

      <nav class="sidebar-nav">
        <a class="nav-item active" href="#" id="navNotes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          All Notes
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section-label">Editor</div>

      <!-- Editor lives in sidebar -->
      <div class="editor-panel">
        <div class="field-group">
          <label class="field-label" for="filename">Filename</label>
          <input type="text" id="filename" class="field-input" placeholder="my-note.txt" autocomplete="off" />
        </div>

        <div class="field-group">
          <label class="field-label" for="content">Content</label>
          <textarea id="content" class="field-textarea" placeholder="Start writing…"></textarea>
        </div>

        <div class="editor-actions">
          <button class="btn btn-primary" id="saveBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            Save
          </button>
          <button class="btn btn-secondary" id="updateBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Update
          </button>
          <button class="btn btn-ghost" id="clearBtn">Clear</button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="main-header">
        <div class="main-header-left">
          <h1 class="main-title">All Notes</h1>
          <span class="note-count" id="noteCount">—</span>
        </div>
        <div class="main-header-right">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search notes…" autocomplete="off" />
          </div>
          <button class="btn btn-ghost icon-btn" id="refreshBtn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Notes Grid -->
      <div id="notesList" class="notes-grid"></div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p class="empty-title">No notes yet</p>
        <p class="empty-sub">Create your first note using the editor.</p>
      </div>
    </main>
  </div>

  <!-- View Modal -->
  <div class="modal-backdrop" id="viewModalBackdrop">
    <div class="modal" id="viewModal" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <svg class="modal-file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <h2 class="modal-title" id="viewModalTitle">filename.txt</h2>
        </div>
        <button class="modal-close" id="viewModalClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <pre id="viewModalContent" class="modal-content-pre"></pre>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-backdrop" id="deleteModalBackdrop">
    <div class="modal modal-sm" id="deleteModal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="delete-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </div>
      </div>
      <div class="modal-body delete-modal-body">
        <p class="delete-heading">Delete note?</p>
        <p class="delete-filename" id="deleteFilenameLabel">filename.txt</p>
        <p class="delete-warning">This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- Global Loader -->
  <div id="globalLoader" class="global-loader hidden">
    <div class="loader-spinner"></div>
  </div>

  <!-- Hidden legacy elements (kept for script.js compatibility — replaced by new JS) -->
  <div style="display:none">
    <span id="previewFilename"></span>
    <span id="previewContent"></span>
    <div id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
